name: Auto-update index.html

on:
  push:
    paths:
      - "votes/**"
      - ".github/workflows/update-index.yml"
      - ".github/scripts/update-index.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-indexes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build index block from vote files
        run: node .github/scripts/update-index.js

      - name: Commit index.html if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update index.html"
          git add index.html votes/
          git push
